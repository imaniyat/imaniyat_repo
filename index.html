<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IMANIYAT | Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top,#fff8ef,#f5efe6 40%,#ece7df);
    position:relative;
}

/* Decorative circles */

body::before,
body::after{
    content:'';
    position:absolute;
    border-radius:50%;
    filter:blur(70px);
    opacity:.35;
}

body::before{
    width:350px;
    height:350px;
    background:#5b8d8b;
    top:-120px;
    left:-120px;
}

body::after{
    width:300px;
    height:300px;
    background:#d8b08c;
    bottom:-120px;
    right:-120px;
}

/* Floating particles */

.particle{
    position:absolute;
    width:8px;
    height:8px;
    background:#5b8d8b;
    border-radius:50%;
    opacity:.25;
    animation:float 8s linear infinite;
}

@keyframes float{

    from{
        transform:translateY(20px);
        opacity:0;
    }

    30%{
        opacity:.3;
    }

    to{
        transform:translateY(-100vh);
        opacity:0;
    }

}

.container{

    text-align:center;
    z-index:10;

    animation:intro 1.4s ease;
}

@keyframes intro{

    0%{
        opacity:0;
        transform:translateY(40px) scale(.85);
    }

    100%{
        opacity:1;
        transform:translateY(0) scale(1);
    }

}

.logo{

    width:180px;
    margin-bottom:25px;

    animation:logoFloat 4s ease-in-out infinite;
}

@keyframes logoFloat{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

}

h1{

    font-size:52px;
    color:#5b8d8b;
    letter-spacing:3px;
    margin-bottom:12px;
}

h2{

    font-size:26px;
    color:#b98966;
    margin-bottom:20px;
    font-weight:600;
}

p{

    color:#666;
    font-size:18px;
    max-width:500px;
    margin:auto;
    line-height:1.7;
}

.loader{

    margin:45px auto 0;
    width:70px;
    display:flex;
    justify-content:space-between;
}

.loader span{

    width:12px;
    height:12px;
    border-radius:50%;
    background:#5b8d8b;

    animation:bounce 1s infinite;
}

.loader span:nth-child(2){

    animation-delay:.2s;
}

.loader span:nth-child(3){

    animation-delay:.4s;
}

@keyframes bounce{

    0%,80%,100%{
        transform:scale(.4);
        opacity:.4;
    }

    40%{
        transform:scale(1);
        opacity:1;
    }

}

@media(max-width:700px){

.logo{
    width:140px;
}

h1{
    font-size:36px;
}

h2{
    font-size:22px;
}

p{
    font-size:16px;
    padding:0 20px;
}

}

</style>

</head>
<body>

<!-- Floating particles -->
<div class="particle" style="left:8%; animation-delay:0s;"></div>
<div class="particle" style="left:18%; animation-delay:2s;"></div>
<div class="particle" style="left:32%; animation-delay:4s;"></div>
<div class="particle" style="left:52%; animation-delay:1s;"></div>
<div class="particle" style="left:68%; animation-delay:5s;"></div>
<div class="particle" style="left:82%; animation-delay:3s;"></div>
<div class="particle" style="left:92%; animation-delay:6s;"></div>

<div class="container" dir="rtl">

    <img src="logo.png" class="logo" alt="IMANIYAT Logo">

    <h1>إيمانيات</h1>

    <h2>قريبا...</h2>

    <p>
        هذا الموقع قيد التطوير حاليًا.<br>
        نعمل بجد لتحسين خدماتنا و إرضاء تطلعاتكم.
    </p>

    <div class="loader">
        <span></span>
        <span></span>
        <span></span>
    </div>

</div>

</body>
</html>
