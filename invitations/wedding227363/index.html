<style>
:root{
  --sage:#9fb08e;
  --sage-dark:#7e9070;
  --ivory:#fdfbf4;
  --cream:#f8f4e8;
  --rose:#be7214;
  --rose-dark:#a96511;
  --crimson:#8e2f3c;
  --charcoal:#3d3a36;
  --gray:#8a857d;
  --line:#e6dfd0;
  --gold:#c8a13b;
  --gold-dark:#8a6a1e;
  --paper:#fffdf9;
  --paper-shade:#efe6ce;
  --script:'Great Vibes',cursive;
  --serif:'Playfair Display',serif;
  --sans:'Montserrat',sans-serif;
}
html[lang="ar"]{
  --script:'Aref Ruqaa',serif;
  --serif:'Amiri',serif;
  --sans:'Reem Kufi',sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:var(--sans);
  color:var(--charcoal);
  background:var(--ivory);
  overflow:hidden; /* unlocked after envelope opens */
}
body.opened{overflow:auto}

/* ═══════════════════ 1. ENVELOPE ═══════════════════ */
#envelope{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;
  background:
    radial-gradient(circle at 12% 88%, rgba(159,176,142,.38), transparent 55%),
    radial-gradient(circle at 88% 8%, rgba(159,176,142,.3), transparent 50%),
    radial-gradient(circle at 50% 45%, #fffefb, #f7f2e4 75%);
  transition:opacity 1s ease .9s, visibility 0s linear 1.9s;
  perspective:1400px;
  overflow:hidden;
  padding:20px;
}
body.opened #envelope{opacity:0;visibility:hidden}

.env-invited{
  position:relative;z-index:2;
  font-family:var(--script);
  font-size:clamp(2.1rem,7vw,3rem);
  color:var(--charcoal);
  text-align:center;
  padding:0 20px;
  transition:opacity .6s ease, transform .6s ease;
}
.env-hint{
  position:relative;z-index:2;
  font-family:var(--sans);font-size:.74rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--gray);
  animation:hintBlink 2.4s ease-in-out infinite;
  transition:opacity .5s;
}
@keyframes hintBlink{0%,100%{opacity:.45}50%{opacity:1}}
body.opening .env-invited, body.opening .env-hint{opacity:0}

/* ── the physical envelope ── */
.envelope{
  position:relative;z-index:2;
  width:min(76vw,280px);
  aspect-ratio:3/2;
  transition:transform .8s ease .1s;
  transform-style:preserve-3d;
}
body.opening .envelope{transform:translateY(14px) scale(.95)}

.env-shadow{
  position:absolute;left:6%;right:6%;bottom:-16px;height:24px;z-index:0;
  background:radial-gradient(ellipse,rgba(60,55,35,.32),transparent 72%);
  filter:blur(4px);
}

/* soft foliage sprays peeking from behind the envelope */
.env-floral{
  position:absolute;z-index:0;width:150px;height:150px;
  pointer-events:none;opacity:.95;
  transition:opacity .6s ease;
}
.env-floral.bl{left:-46px;bottom:-46px;transform:rotate(-6deg)}
.env-floral.tr{right:-46px;top:-56px;transform:rotate(174deg)}
body.opening .env-floral{opacity:0}

/* envelope body (back + visible inner fold seams) */
.env-body{
  position:absolute;inset:0;z-index:2;
  border-radius:3px;
  background:linear-gradient(160deg,var(--paper),var(--paper-shade) 130%);
  box-shadow:
    0 20px 44px rgba(70,58,35,.24),
    inset 0 2px 0 rgba(255,255,255,.6),
    inset 0 0 0 1px rgba(184,162,110,.3);
  overflow:hidden;
}
.env-body::before{ /* left inner fold seam */
  content:'';position:absolute;inset:0;
  clip-path:polygon(0 0,0 100%,50% 55%);
  background:linear-gradient(115deg,rgba(203,183,132,.4),rgba(203,183,132,0) 65%);
}
.env-body::after{ /* right inner fold seam */
  content:'';position:absolute;inset:0;
  clip-path:polygon(100% 0,100% 100%,50% 55%);
  background:linear-gradient(245deg,rgba(203,183,132,.4),rgba(203,183,132,0) 65%);
}
.env-bottom-fold{ /* bottom inner fold seam */
  position:absolute;inset:0;
  clip-path:polygon(0 100%,100% 100%,50% 52%);
  background:linear-gradient(0deg,rgba(216,197,150,.45),transparent 68%);
}

/* folded top flap */
.env-flap{
  position:absolute;top:0;left:0;right:0;height:60%;z-index:3;
  clip-path:polygon(0 0,100% 0,50% 100%);
  background:linear-gradient(165deg,var(--paper),var(--paper-shade) 135%);
  transform-origin:top center;
  transition:transform 1.3s cubic-bezier(.6,.05,.3,1);
  box-shadow:0 8px 16px rgba(70,58,30,.14);
}
.env-flap::after{ /* fold crease shading */
  content:'';position:absolute;inset:0;
  clip-path:polygon(0 0,100% 0,50% 100%);
  background:linear-gradient(180deg,transparent 55%,rgba(170,148,95,.28) 100%);
}
body.opening .env-flap{transform:rotateX(-178deg)}

/* wax seal */
.seal{
  position:absolute;left:50%;top:53%;z-index:4;
  transform:translate(-50%,-50%);
  width:22%;aspect-ratio:1;
  border-radius:47% 53% 51% 49% / 52% 48% 53% 47%;
  background:radial-gradient(circle at 34% 28%, #f6e3a8, var(--gold) 55%, var(--gold-dark) 100%);
  box-shadow:
    0 8px 16px rgba(110,80,20,.4),
    inset 0 2px 4px rgba(255,240,205,.55),
    inset 0 -4px 7px rgba(90,60,10,.4);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  animation:sealPulse 2.6s ease-in-out infinite;
  transition:transform .8s ease, opacity .8s ease;
  border:none;
}
.seal::before{
  content:'';position:absolute;inset:14%;
  border-radius:50%;
  border:1px solid rgba(255,240,205,.5);
}
.seal span{
  font-family:var(--serif);
  font-size:clamp(.85rem,2.6vw,1.2rem);font-style:italic;
  color:#5c3d10;
  text-shadow:0 1px 1px rgba(255,240,210,.5);
}
@keyframes sealPulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.06)}}
body.opening .seal{transform:translate(-50%,-50%) scale(.3) rotate(18deg);opacity:0;animation:none}

/* ═══════════════════ language toggle ═══════════════════ */
#lang-toggle{
  position:fixed;top:16px;right:16px;z-index:90;
  display:flex;gap:2px;
  background:rgba(253,251,244,.88);
  backdrop-filter:blur(8px);
  border:1px solid var(--line);
  border-radius:30px;padding:4px;
  box-shadow:0 4px 14px rgba(60,55,45,.15);
  opacity:0;pointer-events:none;transition:opacity .8s ease 1.2s;
}
body.opened #lang-toggle{opacity:1;pointer-events:auto}
#lang-toggle button{
  border:none;background:transparent;cursor:pointer;
  font-family:var(--sans);font-size:.78rem;font-weight:600;
  color:var(--gray);
  padding:6px 13px;border-radius:24px;
  transition:all .3s;
}
#lang-toggle button.active{background:var(--rose);color:#fff}

/* ═══════════════════ 2. HERO ═══════════════════ */
#hero{
  position:relative;
  height:100vh;height:100svh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#hero .media, #hero video, #hero img.hero-img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
}
#hero .media{ /* fallback if no video/image set */
  background:
    radial-gradient(circle at 30% 80%, rgba(158,176,142,.55), transparent 55%),
    radial-gradient(circle at 75% 20%, rgba(233,213,180,.7), transparent 55%),
    linear-gradient(160deg,#c9d3b8 0%,#e9dcc3 45%,#d9c7a8 100%);
}
#hero .veil{position:absolute;inset:0;background:rgba(30,32,25,.18)}
.hero-card{
  position:relative;z-index:2;
  background:rgba(253,251,244,.82);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.7);
  border-radius:8px;
  padding:46px 40px 38px;
  margin:0 20px;
  max-width:480px;width:100%;
  text-align:center;
  box-shadow:0 30px 70px rgba(40,38,30,.3);
  opacity:0;transform:translateY(30px);
  transition:opacity 1.2s ease 1.4s, transform 1.2s ease 1.4s;
}
body.opened .hero-card{opacity:1;transform:translateY(0)}
.hero-sub{
  font-size:.8rem;letter-spacing:4px;text-transform:uppercase;
  color:var(--rose);font-weight:600;
}
.hero-names{
  font-family:var(--script);
  font-size:clamp(3rem,10vw,4.4rem);
  color:var(--charcoal);
  line-height:1.25;
  margin:12px 0 10px;
  font-weight:400;
}
.hero-date{
  font-family:var(--serif);font-style:italic;
  font-size:1.05rem;color:var(--gray);
}
.hero-sep{width:60px;height:1px;background:var(--rose);margin:18px auto;opacity:.6}
.countdown{display:flex;justify-content:center;gap:16px}
.cd-box b{display:block;font-family:var(--serif);font-size:1.5rem;color:var(--charcoal)}
.cd-box span{font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray)}
.scroll-cue{
  position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:2;
  color:#fff;font-size:1.4rem;opacity:.85;
  animation:cue 2s ease-in-out infinite;
}
@keyframes cue{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,10px)}}

/* ═══════════════════ 3. SECTIONS ═══════════════════ */
main{background:var(--ivory)}
section{
  max-width:620px;margin:0 auto;
  padding:70px 26px 20px;
  text-align:center;
}
.sec-title{
  font-family:var(--script);
  font-size:clamp(2.4rem,7vw,3rem);
  font-weight:400;
  color:var(--rose);
  margin-bottom:8px;
}
.sec-orn{width:70px;height:1px;background:var(--rose);opacity:.5;margin:0 auto 34px;position:relative}
.sec-orn::after{
  content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(45deg);
  width:7px;height:7px;border:1px solid var(--rose);background:var(--ivory);
}
.fade{opacity:0;transform:translateY(26px);transition:opacity .9s ease,transform .9s ease}
.fade.visible{opacity:1;transform:translateY(0)}

/* invitation poem */
.invite-poem{
  font-family:var(--serif);font-style:italic;
  font-size:1.05rem;line-height:2.15;
  color:var(--charcoal);
  margin-bottom:36px;
}
.invite-poem p{margin:0}
.invite-monogram{
  display:flex;align-items:center;justify-content:center;gap:14px;
  width:140px;height:140px;margin:0 auto 32px;
  border-radius:50%;border:1.5px solid var(--rose);
  position:relative;
}
.invite-monogram::before{
  content:'';position:absolute;inset:8px;
  border:1px solid var(--rose);border-radius:50%;opacity:.5;
}
.invite-monogram span{
  font-family:'Amiri',serif;font-weight:700;
  font-size:2.5rem;line-height:1;color:var(--rose);
}
.invite-monogram .im-sep{
  width:5px;height:5px;border:1px solid var(--rose);
  background:var(--ivory);transform:rotate(45deg);
}
.invite-couple{
  font-family:var(--script);font-weight:400;
  font-size:clamp(2rem,6vw,2.6rem);
  color:var(--charcoal);margin-bottom:6px;
}
.invite-date{
  font-family:var(--serif);font-style:italic;
  font-size:1rem;color:var(--gray);
  letter-spacing:1px;margin-bottom:34px;
}
.invite-closing{
  font-family:var(--serif);font-style:italic;
  font-size:.95rem;line-height:2;color:var(--gray);
}
.invite-closing p{margin:0}

/* wedding date */
.wedding-date-big{
  font-family:var(--serif);font-style:italic;
  font-size:clamp(1.2rem,4vw,1.5rem);color:var(--charcoal);
}

/* closing greeting */
.greet-text{
  font-family:var(--serif);font-style:italic;
  font-size:1.2rem;line-height:1.9;color:var(--charcoal);
  max-width:480px;margin:0 auto;
}

.btn{
  display:inline-block;
  background:var(--rose);color:#fff;
  font-family:var(--sans);font-size:.82rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  padding:14px 34px;border-radius:40px;
  text-decoration:none;border:none;cursor:pointer;
  box-shadow:0 8px 20px rgba(183,110,121,.35);
  transition:transform .25s, box-shadow .25s;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(183,110,121,.45)}
.btn.ghost{
  background:transparent;color:var(--rose);
  border:1.5px solid var(--rose);box-shadow:none;
}

/* details + map */
.venue-name{font-family:var(--serif);font-size:1.3rem;font-weight:600;margin-bottom:4px}
.venue-addr{font-size:.9rem;color:var(--gray);margin-bottom:22px}
.map-wrap{
  border-radius:10px;overflow:hidden;
  border:1px solid var(--line);
  box-shadow:0 14px 34px rgba(60,55,45,.14);
  margin-bottom:22px;
}
.map-wrap iframe{display:block;width:100%;height:300px;border:0}
.detail-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

footer{
  margin-top:70px;padding:44px 20px 54px;
  background:var(--cream);
  text-align:center;
}
.footer-names{font-family:var(--script);font-size:2.2rem;color:var(--rose)}
.footer-note{font-size:.8rem;color:var(--gray);margin-top:8px;letter-spacing:1px}

@media (max-width:420px){
  .hero-card{padding:36px 22px 30px}
}
</style>
</head>

<script>
/* ══════════════════════════════════════════════════════════════
   ✏️  EDIT EVERYTHING HERE — swap URLs and text as simple strings.
       Nothing below the I18N block needs to be touched.
   ══════════════════════════════════════════════════════════════ */
const CONFIG = {
  initials: "A & I",

  // ── MEDIA ── paste direct URLs (Cloudinary / Imgur / your host).

  heroImageUrl: "",                       // e.g. "https://i.imgur.com/xxxx.jpg"

  // ── DATE (for the live countdown + calendar button) ──
  weddingDateISO: "2026-08-08T23:00:00",
  weddingEndISO:  "2026-08-09T04:00:00",

  // ── VENUE ── (display name/address are per-language in I18N below; this is only used to locate the map pin)
  // built from the venue name/address below (no API key needed). For a nicer embed later:
  // Google Maps → Share → "Embed a map" → copy the src="..." URL and paste it here instead.
  mapsEmbedUrl: "https://www.google.com/maps?q=" + encodeURIComponent("name of venue") + "&output=embed",
  mapsDirectionsUrl: "https://maps.app.goo.gl/Nb7D26vgAGrF8Yk57",

  defaultLang: "fr"                       // "fr" | "en" | "ar"
};

/* ── ALL TEXT, IN 3 LANGUAGES ─────────────────────────────────── */
const I18N = {
  fr: {
    namesParts: ["Abdellahi", "&", "Iman"],
    subtitle: "Nous nous marions",
    dateText: "Samedi 8 août 2026 à 23h00",
    cd: ["Jours","Heures","Minutes","Secondes"],
    invitePoem: [
      "Qu'Allah les bénisse tous deux et les réunisse dans le bien et la joie.",
      "La joie partagée est une joie doublée,",
      "entourés des sourires de leurs proches,",
      "nous sommes honorés de vous inviter à assister à la cérémonie de mariage de"
    ],
    inviteClosing: [
      "Et cela, par la volonté d'Allah,",
      "Qu'Allah leur accorde une vie heureuse et longue."
    ],
    dateTitle: "Le Jour J",
    detailsTitle: "Détails de l'événement",
    venueName: "Salle Al-Louloua",
    venueAddress: "Nouakchott-Ouest, Mauritanie",
    directions: "Itinéraire",
    calendar: "Ajouter au calendrier",
    greet: "Votre présence comblera notre joie et notre bonheur.",
    footer: "Avec tout notre amour"
  },
  en: {
    namesParts: ["Abdellahi", "&", "Iman"],
    subtitle: "We are getting married",
    dateText: "Saturday, August 8, 2026 at 23h00",
    cd: ["Days","Hours","Minutes","Seconds"],
    invitePoem: [
      "O Allah, bless them both and unite them in goodness and joy.",
      "Joy shared is joy doubled,",
      "amidst the smiles of loved ones,",
      "we are honored to invite you to attend the wedding ceremony of"
    ],
    inviteClosing: [
      "By Allah's will,",
      "May Allah grant them a long and happy life."
    ],
    dateTitle: "The Big Day",
    detailsTitle: "Event Details",
    venueName: "Al-Louloua Hall",
    venueAddress: "Nouakchott West, Mauritania",
    directions: "Get directions",
    calendar: "Add to calendar",
    greet: "Your presence will complete our joy and happiness.",
    footer: "With all our love"
  },
  ar: {
    namesParts: ["عبد الله", "&", "إيمان"],
    subtitle: "زواج",
    dateText: "السبت 8 أغسطس 2026 الساعة 23:00",
    cd: ["يوم","ساعة","دقيقة","ثانية"],
    invitePoem: [
      "اللهم بارك لهما وعليهما واجمع بينهما بالخير و المسره",
      "ان السرور اذا تشارك تضاعفت",
      "بسماته مع زمرة الأحباب",
      "نتشرف بدعوتكم لحضور حفل زفاف"
    ],
    inviteClosing: [
      "و ذلك بمشيئة الله",
      "اللهم اجعلها حياة سعيده مديده"
    ],
    dateTitle: "يوم الزفاف",
    detailsTitle: "تفاصيل الحفل",
    venueName: "قاعة اللؤلؤه",
    venueAddress: "نواكشوط الغربية، موريتانيا",
    directions: "الاتجاهات",
    calendar: "أضف إلى التقويم",
    greet: "بحضوركم يتم لنا الفرح و السرور",
    footer: "مع كل حبنا"
  }
};
/* ════════════ no need to edit anything below this line ════════════ */

let lang = CONFIG.defaultLang;

function render(){
  const t = I18N[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';

  // simple text bindings
  document.querySelectorAll('[data-i18n]').forEach(el => {
    if (t[el.dataset.i18n] !== undefined) el.textContent = t[el.dataset.i18n];
  });
  document.querySelectorAll('[data-cd]').forEach(el => el.textContent = t.cd[+el.dataset.cd]);
  
  // hero names with line breaks
  if (t.namesParts) {
    document.getElementById('hero-names').innerHTML = t.namesParts.map(part => `<span style="display:block">${part}</span>`).join('');
    const plainNames = `${t.namesParts[0]} & ${t.namesParts[2]}`;
    document.getElementById('footer-names').textContent = plainNames;
    document.getElementById('invite-couple').textContent = plainNames;
  }

  // invitation poem
  document.getElementById('invite-poem').innerHTML = t.invitePoem.map(line => `<p>${line}</p>`).join('');
  document.getElementById('invite-closing').innerHTML = t.inviteClosing.map(line => `<p>${line}</p>`).join('');

  // wedding date
  document.getElementById('wedding-date-big').textContent = t.dateText;

  // venue (per-language name/address)
  if (document.getElementById('venue-name')) document.getElementById('venue-name').textContent = t.venueName;
  if (document.getElementById('venue-addr')) document.getElementById('venue-addr').textContent = t.venueAddress;

  // greeting
  document.getElementById('greet-text').textContent = t.greet;

  // language toggle active state
  document.querySelectorAll('#lang-toggle button').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === lang));

  tick();
}

document.querySelectorAll('#lang-toggle button').forEach(b =>
  b.addEventListener('click', () => { lang = b.dataset.lang; render(); }));

/* ── static CONFIG bindings ── */
document.getElementById('seal-initials').textContent = CONFIG.initials;
if (document.getElementById('map-frame')) document.getElementById('map-frame').src = CONFIG.mapsEmbedUrl;
if (document.getElementById('directions-link')) document.getElementById('directions-link').href = CONFIG.mapsDirectionsUrl;

/* ── hero media (video > image > gradient fallback) ── */
(function(){
  const wrap = document.getElementById('hero-media');
  if (CONFIG.heroVideoUrl){
    const v = document.createElement('video');
    v.src = CONFIG.heroVideoUrl;
    v.muted = true; v.loop = true; v.playsInline = true; v.autoplay = true;
    v.setAttribute('muted',''); v.setAttribute('playsinline','');
    wrap.appendChild(v);
  } else if (CONFIG.heroImageUrl){
    const img = document.createElement('img');
    img.className = 'hero-img'; img.src = CONFIG.heroImageUrl; img.alt = '';
    wrap.appendChild(img);
  }
})();

/* ── "Add to calendar" (Google Calendar link, built from CONFIG) ── */
(function(){
  const fmt = iso => iso.replace(/[-:]/g,'').split('.')[0];
  const d = I18N[CONFIG.defaultLang];
  const title = encodeURIComponent('Wedding — ' + d.names);
  const loc = encodeURIComponent(d.venueName + ', ' + d.venueAddress);
  const calLink = document.getElementById('calendar-link');
  if (calLink) {
    calLink.href = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${fmt(CONFIG.weddingDateISO)}/${fmt(CONFIG.weddingEndISO)}&location=${loc}`;
  }
})();

/* ── envelope opening ── */
const seal = document.getElementById('seal');
seal.addEventListener('click', () => {
  document.body.classList.add('opening');
  setTimeout(() => {
    document.body.classList.add('opened');
    const v = document.querySelector('#hero video');
    if (v) v.play().catch(() => {});
  }, 900);
}, { once:true });

/* ── countdown ── */
const target = new Date(CONFIG.weddingDateISO).getTime();
const toDigits = n => {
  const s = String(n).padStart(2,'0');
  return lang === 'ar' ? s.replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]) : s;
};
function tick(){
  const diff = Math.max(0, target - Date.now());
  document.getElementById('cd-d').textContent = toDigits(Math.floor(diff/864e5));
  document.getElementById('cd-h').textContent = toDigits(Math.floor(diff/36e5)%24);
  document.getElementById('cd-m').textContent = toDigits(Math.floor(diff/6e4)%60);
  document.getElementById('cd-s').textContent = toDigits(Math.floor(diff/1e3)%60);
}
setInterval(tick, 1000);

/* ── scroll reveal ── */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting){ e.target.classList.add('visible'); io.unobserve(e.target); } });
}, { threshold:.12 });
document.querySelectorAll('.fade').forEach(el => io.observe(el));

render();
</script>
</body>
